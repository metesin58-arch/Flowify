    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS / Android Native Feel -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no" />
    
    <title>Flowify</title>

     crossorigin="anonymous"></script>
    
    <!-- Premium Fonts for 2026 Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&subset=latin,latin-ext&display=swap" rel="stylesheet">
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          extend: {
            colors: {
              brand: '#1ed760',
              spotify: {
                green: '#1DB954',
                black: '#000000',
                dark: '#050505',
                light: '#121212',
                gray: '#717171'
              }
            },
            borderRadius: {
              '3xl': '24px',
              '4xl': '32px',
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        },
      }
    </script>
    <style>
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
      }

      html, body {
        overscroll-behavior: none;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #000000;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        margin: 0;
        padding: 0;
        position: fixed;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* Premium Glassmorphism */
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .glass-dark {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      /* GPU Hardware Acceleration & Smooth Inertia Touch Scroll for Mobile */
      .overflow-y-auto, .overflow-x-auto {
        -webkit-overflow-scrolling: touch !important;
        transform: translate3d(0,0,0);
        will-change: transform, scroll-position;
      }

      @media (max-width: 768px) {
        /* Cap expensive dynamic blur filters on mobile to maintain high runtime FPS */
        .glass, .glass-dark, [class*="backdrop-blur-"] {
          backdrop-filter: blur(6px) !important;
          -webkit-backdrop-filter: blur(6px) !important;
        }
      }

      /* Custom Scrollbar - Invisible but functional */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Smooth Transitions */
      .page-transition {
        transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.4s ease;
      }

      /* Safe Area Helpers */
      .pt-safe { padding-top: var(--sat); }
      .pb-safe { padding-bottom: var(--sab); }
      .mt-safe { margin-top: var(--sat); }
      .mb-safe { margin-bottom: var(--sab); }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }

      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      .animate-breathe { animation: breathe 4s ease-in-out infinite; }

      @keyframes glowBreatheGreen {
        0%, 100% {
          text-shadow: 0 0 8px rgba(29, 185, 84, 0.3), 0 0 16px rgba(29, 185, 84, 0.1);
        }
        50% {
          text-shadow: 0 0 20px rgba(29, 185, 84, 0.95), 0 0 35px rgba(29, 185, 84, 0.4);
        }
      }
      .animate-glow-green {
        animation: glowBreatheGreen 3.5s ease-in-out infinite;
      }

      @keyframes glowBreathePurple {
        0%, 100% {
          text-shadow: 0 0 8px rgba(168, 85, 247, 0.3), 0 0 16px rgba(168, 85, 247, 0.1);
        }
        50% {
          text-shadow: 0 0 20px rgba(168, 85, 247, 0.95), 0 0 35px rgba(168, 85, 247, 0.4);
        }
      }
      .animate-glow-purple {
        animation: glowBreathePurple 3.5s ease-in-out infinite;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

      #root {
        height: 100%;
        width: 100%;
        max-width: 440px;
        margin: 0 auto;
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        overflow: hidden; /* Ensure root doesn't scroll */
        background-color: #000000;
        border-left: 1px solid rgba(255, 255, 255, 0.03);
        border-right: 1px solid rgba(255, 255, 255, 0.03);
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
      }

      /* Global Touch & Tap Optimization: Prevent sticky cursor hover effects on mobile/touch viewports */
      @media (hover: none), (pointer: coarse), (max-width: 1024px) {
        /* Block transitions, scales, translations, filters and shadow changes on hover */
        [class*="hover\:"]:hover,
        [class*="group-hover\:"]:hover {
          transform: none !important;
          scale: 1 !important;
          filter: none !important;
        }
      }
    </style>
