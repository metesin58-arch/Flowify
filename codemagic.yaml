# Codemagic CI/CD configuration for Flowify (Capacitor)

workflows:
  # ==========================================
  # 1. ANDROID WORKFLOW
  # ==========================================
  android-workflow:
    name: Android Debug Build (APK)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor Android platform
        script: |
          npx cap sync android
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

  # ==========================================
  # 2. IOS SIMULATOR WORKFLOW (UNSIGNED)
  # ==========================================
  ios-simulator-workflow:
    name: iOS Simulator Build (Unsigned)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Patch AdMob compilation issue (Swift enum rename)
        script: |
          node scripts/patch-admob.cjs
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor iOS platform
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Build iOS Simulator App
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -arch x86_64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - ios/App/build/Debug-iphonesimulator/App.app

  # ==========================================
  # 3. IOS DEVICE WORKFLOW (SIGNED IPA FOR TESTFLIGHT)
  # ==========================================
  ios-device-workflow:
    name: iOS Device Build (Signed IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    # Active connection to Apple Developer Portal using Codemagic Integration
    integrations:
      app_store_connect: codemagic # Must match the Developer Portal integration name in Codemagic UI

    environment:
      # Disabled ios_signing pre-validation block to allow dynamic profile creation via CLI
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Patch AdMob compilation issue (Swift enum rename)
        script: |
          node scripts/patch-admob.cjs
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor iOS platform
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.flowify.game" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            -w "$XCODE_WORKSPACE" \
            -s "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      
    publishing:
      # Automatically uploads the successfully built and signed IPA to TestFlight
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - metesin58@gmail.com
        notify:
          success: true
          failure: true
