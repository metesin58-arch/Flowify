# Flowify Codemagic CI/CD Yapılandırma Dosyası

workflows:
  # ==========================================
  # 1. ANDROID DERLEME SÜRECİ
  # ==========================================
  android-workflow:
    name: Android Derleme (APK)
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Node.js bağımlılıklarını yükle
        script: |
          npm install
      - name: React uygulamasını derle
        script: |
          npm run build
      - name: Capacitor Android dosyalarını senkronize et
        script: |
          npx cap sync android
      - name: Android Gradle derlemesini başlat (.apk)
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      # Çıktı olarak üretilen ve doğrudan telefona yüklenebilen test apk dosyası
      - android/app/build/outputs/apk/debug/app-debug.apk

  # ==========================================
  # 2. IOS DERLEME SÜRECİ
  # ==========================================
  ios-workflow:
    name: iOS Derleme (Simülatör/Test)
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Node.js bağımlılıklarını yükle
        script: |
          npm install
      - name: React uygulamasını derle
        script: |
          npm run build
      - name: Capacitor iOS dosyalarını senkronize et
        script: |
          npx cap sync ios
      - name: CocoaPods bağımlılıklarını kur (iOS)
        script: |
          cd ios/App
          pod install
      - name: iOS Simülatör derlemesini başlat (İmzasız)
        script: |
          # Bu komut test amaçlı olarak imza gerektirmeden Xcode derlemesi yapar
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      # Simülatörde çalıştırılabilen .app çıktısı
      - ios/App/build/Release-iphonesimulator/App.app

# ==========================================
