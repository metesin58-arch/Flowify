# Codemagic CI/CD configuration for Flowify (Capacitor)

workflows:
  # ==========================================
  # 1. ANDROID WORKFLOW
  # ==========================================
  android-workflow:
    name: Android Debug Build (APK)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor Android platform
        script: |
          npx cap sync android
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

  # ==========================================
  # 2. IOS SIMULATOR WORKFLOW (UNSIGNED)
  # ==========================================
  ios-simulator-workflow:
    name: iOS Simulator Build (Unsigned)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Patch AdMob compilation issue (Swift enum rename)
        script: |
          node scripts/patch-admob.cjs
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor iOS platform
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Build iOS Simulator App
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -arch x86_64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - ios/App/build/Debug-iphonesimulator/App.app

  # ==========================================
  # 3. IOS DEVICE WORKFLOW (SIGNED IPA FOR TESTFLIGHT)
  # ==========================================
  ios-device-workflow:
    name: iOS Device Build (Signed IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      # Inject App Store Connect credentials from Codemagic Environment Variables Group
      groups:
        - app_store_credentials
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Patch AdMob compilation issue (Swift enum rename)
        script: |
          node scripts/patch-admob.cjs
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor iOS platform
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          echo "$CM_CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key
          tr -d '\r' < /tmp/cert_key > /tmp/cert_key_clean
          app-store-connect fetch-signing-files "com.flowify.game" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:/tmp/cert_key_clean
          rm -f /tmp/cert_key /tmp/cert_key_clean
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      
    publishing:
      # Automatically uploads the successfully built and signed IPA to TestFlight using environment variables
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - metesin58@gmail.com
        notify:
          success: true
          failure: true
