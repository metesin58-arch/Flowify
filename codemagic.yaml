# Codemagic CI/CD configuration for Flowify (Capacitor)

workflows:
  # ==========================================
  # 1. ANDROID WORKFLOW
  # ==========================================
  android-workflow:
    name: Android Debug Build (APK)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor Android platform
        script: |
          npx cap sync android
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

  # ==========================================
  # 2. IOS SIMULATOR WORKFLOW (UNSIGNED)
  # ==========================================
  ios-simulator-workflow:
    name: iOS Simulator Build (Unsigned)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Patch AdMob compilation issue (Swift enum rename)
        script: |
          sed -i '' 's/UMPConsentStatus/ConsentStatus/g' node_modules/@capacitor-community/admob/ios/Sources/AdMobPlugin/Consent/ConsentExecutor.swift
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor iOS platform
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Build iOS Simulator App
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -arch x86_64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - ios/App/build/Debug-iphonesimulator/App.app

  # ==========================================
  # 3. IOS DEVICE WORKFLOW (SIGNED IPA)
  # ==========================================
  ios-device-workflow:
    name: iOS Device Build (Signed IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    # To use automatic signing, configure your App Store Connect API Key integration in Codemagic UI:
    # 1. Team Settings > Developer Portal.
    # 2. Add Issuer ID, Key ID, and private key .p8 file.
    # 3. Reference the integration name below (usually 'codemagic' or your custom name) and uncomment these lines.
    # integrations:
    #   app_store_connect: codemagic

    environment:
      ios_signing:
        distribution_type: app_store # Options: app_store, ad_hoc, development, enterprise
        bundle_identifier: com.flowify.game
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Patch AdMob compilation issue (Swift enum rename)
        script: |
          sed -i '' 's/UMPConsentStatus/ConsentStatus/g' node_modules/@capacitor-community/admob/ios/Sources/AdMobPlugin/Consent/ConsentExecutor.swift
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor iOS platform
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          # Uncomment these lines if you have enabled Developer Portal integration above
          # keychain initialize
          # app-store-connect fetch-signing-files "com.flowify.game" --type IOS_APP_STORE --create
          # keychain add-certificates
          # xcode-project use-profiles
          echo "Setting up code signing..."
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            -w "$XCODE_WORKSPACE" \
            -s "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
